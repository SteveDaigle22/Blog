baseURL: "https://stevedaigle.ca/"
title: "Steve Daigle"
theme: "PaperMod"

defaultContentLanguage: fr
enableRobotsTXT: true

# Un seul arbre de contenu, billets FR et EN mélangés (stratégie "par billet")
languages:
  fr:
    languageName: "Français"
    weight: 1

pagination:
  pagerSize: 10

params:
  env: production
  description: "M365, Intune, Entra ID — documentation technique d'un admin MSP au Québec"
  defaultTheme: auto
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  assets:
    disableFingerprinting: true
  homeInfoParams:
    Title: "Microsoft 365 pour les TI du Québec"
    Content: >
      Dépannage, configurations et scripts PowerShell pour les environnements
      Microsoft 365 — avec le contexte d'ici : Loi 25, tenants bilingues,
      réalité MSP multi-clients.
  socialIcons:
    - name: github
      url: "https://github.com/SteveDaigle22"
    - name: linkedin
      url: "https://www.linkedin.com/in/steve-daigle"
    - name: rss
      url: "/index.xml"

menus:
  main:
    - name: À propos
      url: /a-propos/
      weight: 10

taxonomies:
  category: categories
  tag: tags

markup:
  highlight:
    style: monokai
    lineNos: false

outputs:
  home: [HTML, RSS]

sitemap:
  changefreq: weekly